<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Python Demo App popup</title>
    <link rel="stylesheet" href="/assets/entry/popup.css">
    <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@moysklad-official/js-widget-sdk@1/dist/widget.min.js"></script>
    <script type="text/javascript"
            src="https://apps-api.moysklad.ru/js/ns/appstore/app/v1/moysklad-iframe-expand-3.js"></script>
</head>
<body>
<main>
    <section class="panel settings">
        <div class="tabs" role="tablist" aria-label="SDK sections">
            <button class="tab active" data-tab="good-folder" role="tab" aria-selected="true">Выбор группы товаров
            </button>
            <button class="tab" data-tab="navigation" role="tab" aria-selected="false">Навигация</button>
            <button class="tab" data-tab="dialogs" role="tab" aria-selected="false">Диалог</button>
            <button class="tab" data-tab="popups" role="tab" aria-selected="false">Попап</button>
        </div>
        <div class="tab-panel active" data-tab-panel="good-folder" role="tabpanel">
            <h2>good-folder-selector</h2>
            <div class="row">
                <button class="btn" id="btnSelectFolder">Выбрать</button>
            </div>
        </div>
        <div class="tab-panel" data-tab-panel="navigation" role="tabpanel">
            <h2>navigation-service</h2>
            <div class="row field-row">
                <label for="navigatePath">Путь</label>
                <input id="navigatePath" value="#customerorder?sort=o.moment%20d">
            </div>
            <div class="row">
                <button class="btn" id="btnNavigate">Перейти</button>
            </div>
        </div>
        <div class="tab-panel" data-tab-panel="dialogs" role="tabpanel">
            <h2>standard-dialogs</h2>
            <div class="row field-row">
                <label for="dialogText">Текст диалога</label>
                <input id="dialogText" value="Hello from SDK">
            </div>
            <div class="row field-row">
                <label for="dialogButtons">Кнопки диалога (JSON)</label>
                <textarea
                    id="dialogButtons">[{ "name": "Yes", "caption": "Да, удалить" },{ "name": "No", "caption": "Нет" }]</textarea>
            </div>
            <div class="row">
                <button class="btn" id="btnDialog">Открыть</button>
            </div>
        </div>
        <div class="tab-panel" data-tab-panel="popups" role="tabpanel">
            <h2>Popups</h2>
            <div class="row field-row">
                <label for="popupName">Название попапа</label>
                <input id="popupName" value="some-popup">
            </div>
            <div class="row field-row">
                <label for="popupParams">Параметры попапа (JSON)</label>
                <textarea id="popupParams">{ "foo": "bar" }</textarea>
            </div>
            <div class="row btn-row">
                <button class="btn" id="btnShowPopup">Открыть</button>
                <button class="btn" id="btnClosePopup">Закрыть</button>
            </div>
        </div>
    </section>
    <section class="panel logs">
        <h2>Логи</h2>
        <div id="log"></div>
    </section>
</main>
<script src="/assets/entry/popup.js"></script>
</body>
</html>
